apiVersion: tekton.dev/v1beta1
kind: PipelineRun
metadata:
  generateName: tax-calculator-run-
spec:
  pipelineRef:
    name: tax-calculator-pipeline
  params:
    - name: repo-url
      value: "https://github.com/[YOUR_GITHUB_USERNAME]/[YOUR_REPO_NAME]"
    - name: image-name
      value: "us.icr.io/[YOUR_NAMESPACE]/tax-calculator:v1"
  workspaces:
    - name: shared-workspace
      persistentVolumeClaim:
        claimName: pipeline-pvc
